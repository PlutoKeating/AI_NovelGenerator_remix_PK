version: "3.8"

# =============================================================================
# Port Configuration Guide
# =============================================================================
# Docker port mapping format: "HOST_PORT:CONTAINER_PORT"
# - HOST_PORT:      The port on your host machine (change this to avoid conflicts)
# - CONTAINER_PORT: The port the service listens on INSIDE the container
#
# You can change HOST_PORT freely without modifying the application code.
# Only change CONTAINER_PORT if you also update the corresponding .env config.
#
# Examples:
#   "8000:8000"  -> Host:8000 maps to Container:8000
#   "8898:8000"  -> Host:8898 maps to Container:8000 (backend still listens on 8000)
#   "3000:80"    -> Host:3000 maps to Container:80 (nginx still listens on 80)
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ai-novel-generator/backend:latest
    container_name: novel-generator-backend
    ports:
      # Format: "HOST_PORT:CONTAINER_PORT"
      # Change HOST_PORT (left side) to avoid conflicts with other services
      # CONTAINER_PORT (right side) must match APP_PORT in backend/.env
      - "${BACKEND_HOST_PORT:-8000}:${BACKEND_CONTAINER_PORT:-8000}"
    env_file:
      - backend/.env
    environment:
      # These override backend/.env inside the container
      # APP_HOST must be 0.0.0.0 to accept connections from outside the container
      - APP_HOST=0.0.0.0
      # APP_PORT must match the CONTAINER_PORT in the ports mapping above
      - APP_PORT=${BACKEND_CONTAINER_PORT:-8000}
      - CORS_ORIGINS=*
      - DATA_DIR=/app/data
    volumes:
      - novel-data:/app/data
    networks:
      - novel-network
    restart: unless-stopped
    healthcheck:
      # Health check uses the INTERNAL container port
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_CONTAINER_PORT:-8000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Build args allow passing the backend URL at build time
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_HOST_PORT:-8000}/api
    image: ai-novel-generator/frontend:latest
    container_name: novel-generator-frontend
    ports:
      # Format: "HOST_PORT:CONTAINER_PORT"
      # Change HOST_PORT (left side) to avoid conflicts (e.g., 8080 if 80 is taken)
      # CONTAINER_PORT (right side) must match nginx listen port in frontend/nginx.conf
      - "${FRONTEND_HOST_PORT:-80}:${FRONTEND_CONTAINER_PORT:-80}"
    environment:
      # Runtime env var for nginx proxy_pass to backend
      # This must point to the backend service name and INTERNAL port
      - BACKEND_URL=http://backend:${BACKEND_CONTAINER_PORT:-8000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - novel-network
    restart: unless-stopped

volumes:
  novel-data:
    driver: local

networks:
  novel-network:
    driver: bridge
